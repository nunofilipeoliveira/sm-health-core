version: '3.8'

# Exemplo de configuração com Cassandra
# Uso: docker-compose -f docker-compose.yml -f docker-compose.cassandra.yml up -d

services:
  sm-health-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm-health-core
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_CASSANDRA_CONTACT_POINTS=db
      - SPRING_DATA_CASSANDRA_PORT=9042
      - SPRING_DATA_CASSANDRA_KEYSPACE_NAME=sm_health
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: cassandra:4.1
    container_name: sm-health-core-db
    restart: unless-stopped
    environment:
      - CASSANDRA_CLUSTER_NAME=sm-health-cluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
    ports:
      - "9042:9042"
    volumes:
      - db_data:/var/lib/cassandra
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
