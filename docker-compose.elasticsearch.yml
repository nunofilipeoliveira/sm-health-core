version: '3.8'

# Exemplo de configuração com Elasticsearch
# Uso: docker-compose -f docker-compose.yml -f docker-compose.elasticsearch.yml up -d

services:
  sm-health-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm-health-core
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_ELASTICSEARCH_URIS=http://db:9200
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: sm-health-core-db
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - db_data:/usr/share/elasticsearch/data
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
