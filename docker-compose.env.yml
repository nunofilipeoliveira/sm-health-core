version: '3.8'

# Exemplo de configuração com variáveis de ambiente
# Uso: docker-compose -f docker-compose.yml -f docker-compose.env.yml up -d

services:
  sm-health-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm-health-core
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:mariadb://db:3306/sm_health}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-root}
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mariadb:11
    container_name: sm-health-core-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${DB_NAME:-sm_health}
      - MYSQL_USER=${DB_USER:-sm_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-sm_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
