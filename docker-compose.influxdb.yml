version: '3.8'

# Exemplo de configuração com InfluxDB
# Uso: docker-compose -f docker-compose.yml -f docker-compose.influxdb.yml up -d

services:
  sm-health-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm-health-core
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - INFLUXDB_URL=http://db:8086
      - INFLUXDB_TOKEN=my-token
      - INFLUXDB_ORG=my-org
      - INFLUXDB_BUCKET=my-bucket
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: influxdb:2
    container_name: sm-health-core-db
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=my-org
      - DOCKER_INFLUXDB_INIT_BUCKET=my-bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-token
    ports:
      - "8086:8086"
    volumes:
      - db_data:/var/lib/influxdb2
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
