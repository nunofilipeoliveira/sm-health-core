version: '3.8'

# Exemplo de configuração com MongoDB
# Uso: docker-compose -f docker-compose.yml -f docker-compose.mongodb.yml up -d

services:
  sm-health-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm-health-core
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_MONGODB_URI=mongodb://db:27017/sm_health
      - SPRING_DATA_MONGODB_DATABASE=sm_health
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mongo:7
    container_name: sm-health-core-db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
      - MONGO_INITDB_DATABASE=sm_health
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
