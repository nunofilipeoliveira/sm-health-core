version: '3.8'

# Exemplo de configuração com PostgreSQL
# Uso: docker-compose -f docker-compose.yml -f docker-compose.postgres.yml up -d

services:
  sm-health-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm-health-core
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sm_health
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    container_name: sm-health-core-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sm_health
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
