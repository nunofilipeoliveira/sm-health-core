version: '3.8'

# Exemplo de configuração com nginx como proxy reverso
# Uso: docker-compose -f docker-compose.proxy.yml up -d

services:
  sm-health-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm-health-core-app
    expose:
      - "8080"
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/sm_health
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - db
    networks:
      - app-network

  nginx-proxy:
    image: nginx:alpine
    container_name: sm-health-core-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - sm-health-core
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: mariadb:11
    container_name: sm-health-core-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=sm_health
      - MYSQL_USER=sm_user
      - MYSQL_PASSWORD=sm_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
